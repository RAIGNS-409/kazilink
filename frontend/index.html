```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>

@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

.animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
.animate-slideIn { animation: slideIn 0.4s ease-out forwards; }
.animate-popIn { animation: popIn 0.3s ease-out forwards; }
.animate-float { animation: float 6s ease-in-out infinite; }

.card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

.nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #6366F1, #0D9488); transition: width 0.3s ease; }
.nav-link:hover::after { width: 100%; }
.gradient-text { background: linear-gradient(135deg, #6366F1 0%, #0D9488 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.toast { padding: 16px 24px; border-radius: 12px; color: white; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); animation: slideIn 0.4s ease-out; min-width: 280px; max-width: 90vw; display: flex; align-items: center; gap: 12px; }
.toast-success { background: linear-gradient(135deg, #10B981, #059669); }
.toast-error { background: linear-gradient(135deg, #EF4444, #DC2626); }
.toast-info { background: linear-gradient(135deg, #3B82F6, #2563EB); }
.loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366F1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
@media (max-width: 768px) {
.mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
.mobile-menu.open { max-height: 600px; }
.touch-target { min-height: 44px; min-width: 44px; }
input, select, textarea, button { font-size: 16px !important; }
}
</style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-0 left-0 w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float"></div>
<div class="absolute top-40 right-0 w-96 h-96 bg-teal-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" style="animation-delay: 2s;"></div>
<div class="absolute bottom-0 left-1/3 w-96 h-96 bg-amber-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-float" style="animation-delay: 4s;"></div>
</div>
<div id="toast-container"></div>
<div id="app" class="flex flex-col min-h-screen">
<div class="flex-grow flex items-center justify-center">
<div class="loader"></div>
</div>
</div>
<script>
const AppState = {
currentUser: null,
currentView: 'home',
viewParams: {},
searchFilters: { keyword: '', category: '', location: '', salary: '', job_type: '' },
editJobId: null,
jobs: [],
categories: ['Technology', 'Agriculture & Gardening', 'Administrative', 'Finance', 'Healthcare', 'Education', 'Marketing'],
mobileMenuOpen: false
};
const $ = (id) => document.getElementById(id);
const formatCurrency = (amount) => new Intl.NumberFormat('en-KE', { style: 'currency', currency: 'KES', maximumFractionDigits: 0 }).format(amount);
const API_BASE = window.location.origin + '/kazilink/api';
const UPLOAD_URL = window.location.origin + '/kazilink/api/upload.php';

function renderAvatar(avatarPath, fallback = '', sizeClass = 'w-full h-full object-cover') {
if (avatarPath && avatarPath.startsWith('/')) {
return `<img src="${avatarPath}" class="${sizeClass}" alt="Avatar" />`;
}
return fallback;
}

function showToast(message, type = 'success') {
const container = $('toast-container');
const toast = document.createElement('div');
toast.className = `toast toast-${type}`;
const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
toast.innerHTML = `<span class="text-xl font-bold">${icon}</span><span>${message}</span>`;
container.appendChild(toast);
setTimeout(() => {
toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.3s ease';
setTimeout(() => toast.remove(), 300);
}, 3500);
}
async function apiCall(action, method = 'GET', body = null, isFormData = false) {
try {
const options = { method: method, credentials: 'include' };
if (body) {
if (isFormData) { options.body = body; }
else { options.headers = { 'Content-Type': 'application/json' }; options.body = JSON.stringify(body); }
}
const url = API_BASE + '/api.php?action=' + action;
const res = await fetch(url, options);
if (!res.ok) throw new Error('HTTP ' + res.status);
const data = await res.json();
return data;
} catch (err) {
console.error('API Error:', err);
return { status: 'error', message: 'Network error: ' + err.message };
}
}
let uploadedFiles = { qual: null, exp: null };
function handleFileSelect(inputId, displayId) {
const input = document.getElementById(inputId);
const display = document.getElementById(displayId);
if (input.files && input.files[0]) {
const file = input.files[0];
display.textContent = file.name;
if (inputId === 'qual-file') uploadedFiles.qual = file;
else if (inputId === 'exp-file') uploadedFiles.exp = file;
}
}
async function uploadFile(file) {
if (!file) return null;
const formData = new FormData();
formData.append('file', file);
try {
const res = await fetch(UPLOAD_URL, { method: 'POST', body: formData, credentials: 'include' });
const data = await res.json();
if (data.status === 'success') return data.data.file_path;
else { showToast(data.message, 'error'); return null; }
} catch (err) { console.error('Upload error:', err); showToast('Upload failed', 'error'); return null; }
}
async function uploadProfilePicture(event) {
const file = event.target.files[0];
if (!file) return;
const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png'];
if (!allowedTypes.includes(file.type)) { showToast('Only JPG, JPEG, and PNG files are allowed', 'error'); return; }
if (file.size > 2 * 1024 * 1024) { showToast('File too large (max 2MB)', 'error'); return; }
const formData = new FormData();
formData.append('profile_picture', file);
showToast('Uploading profile picture...', 'info');
const data = await apiCall('upload_profile_picture', 'POST', formData, true);
if (data.status === 'success') { AppState.currentUser.profile_picture = data.data.file_path; showToast('Profile picture updated!', 'success'); render(); }
else { showToast(data.message, 'error'); }
}
async function saveSocialLinks() {
const payload = { portfolio_url: $('link-portfolio').value, github_url: $('link-github').value, linkedin_url: $('link-linkedin').value, twitter_url: $('link-twitter').value, facebook_url: $('link-facebook').value, instagram_url: $('link-instagram').value };
const data = await apiCall('update_social_links', 'POST', payload);
if (data.status === 'success') { AppState.currentUser = { ...AppState.currentUser, ...payload }; showToast('Social links saved!', 'success'); }
else { showToast(data.message, 'error'); }
}
async function resendVerificationEmail() {
const data = await apiCall('send_verification', 'POST');
if (data.status === 'success') showToast('Verification email sent! Check your inbox.', 'success');
else showToast(data.message, 'error');
}
async function loadInitialData() {
const userData = await apiCall('get_user');
if (userData.status === 'success') AppState.currentUser = userData.data;
const jobsData = await apiCall('get_jobs');
if (jobsData.status === 'success') AppState.jobs = jobsData.data.map(j => ({ ...j, required_qualifications: j.required_qualifications ? j.required_qualifications.split(',') : [] }));
render();
}
function toggleMobileMenu() {
AppState.mobileMenuOpen = !AppState.mobileMenuOpen;
const menu = document.getElementById('mobile-menu');
if (menu) {
if (AppState.mobileMenuOpen) menu.classList.add('open');
else menu.classList.remove('open');
}
}
function navigate(view, params = {}) {
AppState.currentView = view;
AppState.viewParams = params;
AppState.mobileMenuOpen = false;
render();
window.scrollTo({ top: 0, behavior: 'smooth' });
setTimeout(() => {
if (view === 'admin-dashboard') loadAdminStats();
if (view === 'admin-users') loadAdminUsers();
if (view === 'admin-jobs') loadAdminJobs();
if (view === 'admin-reports') loadAdminReports();
if (view === 'seeker-applications') loadMyApplications();
if (view === 'employer-applicants' && params.jobId) loadJobApplicants(params.jobId);
}, 100);
}
async function handleLogin(e) {
e.preventDefault();
const email = $('login-email').value;
const password = $('login-password').value;
const data = await apiCall('login', 'POST', { email, password });
if (data.status === 'success') {
AppState.currentUser = data.data;
showToast(`Welcome back, ${AppState.currentUser.full_name}!`, 'success');
if (AppState.currentUser.role === 'admin') navigate('admin-dashboard');
else if (AppState.currentUser.role === 'employer') navigate('employer-dashboard');
else navigate('seeker-dashboard');
} else { showToast(data.message, 'error'); }
}
async function handleRegister(e) {
e.preventDefault();
const payload = { full_name: $('reg-name').value, email: $('reg-email').value, password: $('reg-password').value, role: $('reg-role').value, phone: $('reg-phone').value };
const data = await apiCall('register', 'POST', payload);
if (data.status === 'success') {
showToast('Account created! Please check your email to verify your account.', 'success');
setTimeout(() => { alert('Please check your email inbox and click the verification link to activate your account.'); navigate('login'); }, 2000);
} else { showToast(data.message, 'error'); }
}
async function logout() {
await apiCall('logout', 'POST');
AppState.currentUser = null;
showToast('Logged out successfully.', 'info');
navigate('home');
}
async function applyForJob(jobId) {
if (!AppState.currentUser) { navigate('login'); return; }
if (AppState.currentUser.role !== 'seeker') { showToast('Only job seekers can apply.', 'error'); return; }
if (AppState.jobs.find(j => j.id == jobId).applied) { showToast('You have already applied.', 'error'); return; }
const data = await apiCall('apply_job', 'POST', { job_id: jobId });
if (data.status === 'success') {
showToast('Application submitted successfully!', 'success');
const job = AppState.jobs.find(j => j.id == jobId);
if(job) job.applied = true;
navigate('seeker-applications');
} else { showToast(data.message, 'error'); }
}
async function postJob(e) {
e.preventDefault();
const payload = { title: $('job-title').value, category: $('job-category').value, description: $('job-desc').value, location: $('job-location').value, salary: parseInt($('job-salary').value), deadline: $('job-deadline').value, job_type: $('job-type').value, required_qualifications: $('job-req-quals').value };
const data = await apiCall('post_job', 'POST', payload);
if (data.status === 'success') {
showToast('Job posted successfully!', 'success');
AppState.editJobId = null;
const jobsData = await apiCall('get_jobs');
if (jobsData.status === 'success') AppState.jobs = jobsData.data;
navigate('employer-manage-jobs');
} else { showToast(data.message, 'error'); }
}
function editJob(jobId) {
const job = AppState.jobs.find(j => j.id == jobId);
if (!job) return;
AppState.editJobId = jobId;
navigate('employer-post-job');
setTimeout(() => { $('job-title').value = job.title; $('job-category').value = job.category; $('job-desc').value = job.description; $('job-location').value = job.location; $('job-salary').value = job.salary; $('job-deadline').value = job.deadline; $('job-type').value = job.job_type; $('job-req-quals').value = (job.required_qualifications || []).join(', '); }, 50);
}
async function updateProfile(e) {
e.preventDefault();
const payload = { full_name: $('prof-name').value, phone: $('prof-phone').value, bio: $('prof-bio').value, skills: $('prof-skills').value };
const data = await apiCall('update_profile', 'POST', payload);
if (data.status === 'success') { AppState.currentUser = { ...AppState.currentUser, ...payload }; showToast('Profile updated!', 'success'); render(); }
else { showToast(data.message, 'error'); }
}
async function addQualification() {
const name = $('qual-name').value; const issuer = $('qual-issuer').value; const date = $('qual-date').value;
if (!name || !issuer) { showToast('Please fill in qualification name and issuer', 'error'); return; }
let docPath = 'No document uploaded';
if (uploadedFiles.qual) { showToast('Uploading file...', 'info'); docPath = await uploadFile(uploadedFiles.qual); if (!docPath) return; }
const payload = { name, issuer, date, doc: docPath };
const data = await apiCall('add_qualification', 'POST', payload);
if (data.status === 'success') { showToast('Qualification added successfully!', 'success'); $('qual-name').value = ''; $('qual-issuer').value = ''; $('qual-date').value = ''; $('qual-file').value = ''; $('qual-file-name').textContent = 'No file chosen'; uploadedFiles.qual = null; render(); }
else { showToast(data.message, 'error'); }
}
async function addExperience() {
const title = $('exp-title').value; const duration = $('exp-duration').value;
if (!title || !duration) { showToast('Please fill in job title and duration', 'error'); return; }
let proofPath = 'No proof uploaded';
if (uploadedFiles.exp) { showToast('Uploading file...', 'info'); proofPath = await uploadFile(uploadedFiles.exp); if (!proofPath) return; }
const payload = { title, duration, proof: proofPath };
const data = await apiCall('add_experience', 'POST', payload);
if (data.status === 'success') { showToast('Experience added successfully!', 'success'); $('exp-title').value = ''; $('exp-duration').value = ''; $('exp-file').value = ''; $('exp-file-name').textContent = 'No file chosen'; uploadedFiles.exp = null; render(); }
else { showToast(data.message, 'error'); }
}
function updateSearchFilter(key, value) { AppState.searchFilters[key] = value; render(); }
function render() {
const { currentUser, currentView } = AppState;
let html = renderNavbar();
html += '<main class="flex-grow pt-20">';
switch (currentView) {
case 'home': html += renderHome(); break;
case 'about': html += renderAbout(); break;
case 'contact': html += renderContact(); break;
case 'jobs': html += renderPublicJobs(); break;
case 'job-details': html += renderJobDetails(AppState.viewParams.id); break;
case 'login': html += renderLogin(); break;
case 'register': html += renderRegister(); break;
case 'seeker-dashboard': html += currentUser ? renderSeekerDashboard() : renderLogin(); break;
case 'seeker-profile': html += currentUser ? renderSeekerProfile() : renderLogin(); break;
case 'seeker-search': html += renderSeekerSearch(); break;
case 'seeker-applications': html += currentUser ? renderSeekerApplications() : renderLogin(); break;
case 'employer-dashboard': html += currentUser ? renderEmployerDashboard() : renderLogin(); break;
case 'employer-post-job': html += currentUser ? renderEmployerPostJob() : renderLogin(); break;
case 'employer-manage-jobs': html += currentUser ? renderEmployerManageJobs() : renderLogin(); break;
case 'employer-applicants': html += currentUser ? renderEmployerApplicants(AppState.viewParams.jobId) : renderLogin(); break;
case 'admin-dashboard': html += currentUser && currentUser.role === 'admin' ? renderAdminDashboard() : renderLogin(); break;
case 'admin-users': html += currentUser && currentUser.role === 'admin' ? renderAdminUsers() : renderLogin(); break;
case 'admin-jobs': html += currentUser && currentUser.role === 'admin' ? renderAdminJobs() : renderLogin(); break;
case 'admin-reports': html += currentUser && currentUser.role === 'admin' ? renderAdminReports() : renderLogin(); break;
default: html += renderHome();
}
html += '</main>' + renderFooter();
$('app').innerHTML = html;
}
function renderNavbar() {
const { currentUser } = AppState;
const links = currentUser ? getRoleLinks(currentUser.role) : getPublicLinks();
return `
<nav class="fixed top-0 w-full z-50 glass border-b border-slate-200/50 shadow-sm">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
<div class="flex justify-between items-center h-16">
<div class="flex items-center cursor-pointer" onclick="navigate('home')">
<img src="https://image.qwenlm.ai/public_source/bc96688c-8f85-4680-8f59-fe72067bb9e0/1b9b2147d-a115-92dc-a98c-75b514408636.png" class="h-10 w-auto" alt="KaziLink Logo" />
<span class="ml-2 text-xl font-bold gradient-text hidden sm:block">KaziLink</span>
</div>
<div class="hidden md:flex items-center space-x-8">
${links.map(l => `<a href="#" onclick="navigate('${l.view}')" class="nav-link text-slate-600 hover:text-indigo-600 font-medium transition-colors ${AppState.currentView === l.view ? 'text-indigo-600' : ''}">${l.label}</a>`).join('')}
</div>
<div class="flex items-center space-x-4">
${currentUser ? `
<div class="hidden md:flex items-center space-x-3">
<span class="text-sm text-slate-600 font-medium">${currentUser.full_name}</span>
<div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-teal-500 flex items-center justify-center text-white text-lg shadow-md overflow-hidden">
${currentUser.profile_picture ? `<img src="${currentUser.profile_picture}" class="w-full h-full object-cover" alt="Profile" />` : '👤'}
</div>
</div>
<button onclick="logout()" class="hidden md:block px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors">Logout</button>
<button onclick="toggleMobileMenu()" class="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg touch-target">
<i class="ph ph-list text-2xl"></i>
</button>
` : `
<button onclick="navigate('login')" class="hidden md:block px-4 py-2 text-sm font-medium text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">Login</button>
<button onclick="navigate('register')" class="hidden md:block btn-primary px-4 py-2 text-sm font-medium text-white rounded-lg shadow-md">Register</button>
<button onclick="toggleMobileMenu()" class="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg touch-target">
<i class="ph ph-list text-2xl"></i>
</button>
`}
</div>
</div>
<div id="mobile-menu" class="mobile-menu md:hidden border-t border-slate-200">
<div class="px-4 py-3 space-y-2">
${currentUser ? `
<div class="flex items-center gap-3 py-3 border-b border-slate-100">
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-teal-500 flex items-center justify-center text-white shadow-md overflow-hidden">
${currentUser.profile_picture ? `<img src="${currentUser.profile_picture}" class="w-full h-full object-cover" alt="Profile" />` : '👤'}
</div>
<div>
<div class="font-semibold text-slate-900">${currentUser.full_name}</div>
<div class="text-xs text-slate-500">${currentUser.email}</div>
</div>
</div>
${links.map(l => `<a href="#" onclick="navigate('${l.view}')" class="block px-4 py-3 text-slate-700 hover:bg-indigo-50 rounded-lg font-medium touch-target flex items-center gap-2"><i class="ph ${l.icon || 'ph-circle'}"></i> ${l.label}</a>`).join('')}
<button onclick="logout()" class="w-full px-4 py-3 text-red-600 hover:bg-red-50 rounded-lg font-medium touch-target flex items-center gap-2">
<i class="ph ph-sign-out"></i> Logout
</button>
` : `
${links.map(l => `<a href="#" onclick="navigate('${l.view}')" class="block px-4 py-3 text-slate-700 hover:bg-indigo-50 rounded-lg font-medium touch-target flex items-center gap-2"><i class="ph ${l.icon || 'ph-circle'}"></i> ${l.label}</a>`).join('')}
<div class="pt-3 border-t border-slate-100 space-y-2">
<button onclick="navigate('login')" class="w-full px-4 py-3 text-indigo-600 hover:bg-indigo-50 rounded-lg font-medium touch-target">Login</button>
<button onclick="navigate('register')" class="w-full btn-primary px-4 py-3 text-white rounded-lg font-medium touch-target">Register</button>
</div>
`}
</div>
</div>
</div>
</nav>
`;
}
function getPublicLinks() { return [{ view: 'home', label: 'Home', icon: 'ph-house' }, { view: 'jobs', label: 'Jobs', icon: 'ph-briefcase' }, { view: 'about', label: 'About', icon: 'ph-info' }, { view: 'contact', label: 'Contact', icon: 'ph-envelope' }]; }
function getRoleLinks(role) {
const base = [{ view: 'home', label: 'Home', icon: 'ph-house' }, { view: 'jobs', label: 'Browse Jobs', icon: 'ph-briefcase' }];
if (role === 'seeker') return [...base, { view: 'seeker-dashboard', label: 'Dashboard', icon: 'ph-gauge' }, { view: 'seeker-search', label: 'Search', icon: 'ph-magnifying-glass' }, { view: 'seeker-applications', label: 'Applications', icon: 'ph-file-text' }, { view: 'seeker-profile', label: 'Profile', icon: 'ph-user' }];
if (role === 'employer') return [...base, { view: 'employer-dashboard', label: 'Dashboard', icon: 'ph-gauge' }, { view: 'employer-post-job', label: 'Post Job', icon: 'ph-plus-circle' }, { view: 'employer-manage-jobs', label: 'Manage Jobs', icon: 'ph-list' }];
if (role === 'admin') return [...base, { view: 'admin-dashboard', label: 'Dashboard', icon: 'ph-gauge' }, { view: 'admin-users', label: 'Users', icon: 'ph-users' }, { view: 'admin-jobs', label: 'Jobs', icon: 'ph-briefcase' }, { view: 'admin-reports', label: 'Reports', icon: 'ph-chart-bar' }];
return base;
}
function renderFooter() {
return `
<footer class="bg-slate-900 text-slate-300 mt-20">
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
<div class="grid grid-cols-1 md:grid-cols-4 gap-8">
<div class="col-span-1 md:col-span-2">
<div class="flex items-center mb-4">
<img src="https://image.qwenlm.ai/public_source/bc96688c-8f85-4680-8f59-fe72067bb9e0/1b9b2147d-a115-92dc-a98c-75b514408636.png" class="h-10 w-auto" alt="KaziLink" />
<span class="ml-2 text-xl font-bold text-white">KaziLink</span>
</div>
<p class="text-slate-400 max-w-md">Connecting top talent with leading employers across Kenya and beyond.</p>
</div>
<div>
<h4 class="text-white font-semibold mb-4">Quick Links</h4>

async function handleContactForm(e) {
e.preventDefault();
const name = $('contact-name').value;
const email = $('contact-email').value;
const subject = $('contact-subject').value;
const message = $('contact-message').value;
const submitBtn = $('contact-submit-btn');
submitBtn.disabled = true;
submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Sending...';
try {
const data = await apiCall('contact', 'POST', {
name: name,
email: email,
subject: subject,
message: message
});
if (data.status === 'success') {
showToast(data.message, 'success');
$('contact-name').value = '';
$('contact-email').value = '';
$('contact-subject').value = '';
$('contact-message').value = '';
} else {
showToast(data.message, 'error');
}
} catch (err) {
showToast('Network error. Please try again.', 'error');
} finally {
submitBtn.disabled = false;
submitBtn.innerHTML = '<i class="ph ph-paper-plane-right"></i> Send Message';
}
}

function renderSeekerSearch() {
const { keyword, category, location, salary, job_type } = AppState.searchFilters;
let filtered = AppState.jobs.filter(j => j.status === 'active');
if (keyword) filtered = filtered.filter(j => j.title.toLowerCase().includes(keyword.toLowerCase()));
if (category) filtered = filtered.filter(j => j.category === category);
if (location) filtered = filtered.filter(j => j.location.toLowerCase().includes(location.toLowerCase()));
if (salary) filtered = filtered.filter(j => j.salary >= parseInt(salary));
if (job_type) filtered = filtered.filter(j => j.job_type === job_type);
return `<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fadeIn">

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 lg:gap-4">
<input type="text" placeholder="Keyword..." value="${keyword}" oninput="updateSearchFilter('keyword', this.value)" class="px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none touch-target" />
<select onchange="updateSearchFilter('category', this.value)" class="px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-white touch-target">

<input type="number" placeholder="Min Salary..." value="${salary}" oninput="updateSearchFilter('salary', this.value)" class="px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none touch-target" />

return `<div class="card-hover bg-white rounded-2xl p-4 lg:p-6 border border-slate-100 shadow-sm cursor-pointer" onclick="navigate('job-details', {id: ${job.id}})">

</div>
<h3 class="font-bold text-lg text-slate-900 mb-1">${job.title}</h3>
<p class="text-sm text-indigo-600 font-medium mb-4">${job.company}</p>

async function loadMyApplications() {
const loading = document.getElementById('applications-loading');
const content = document.getElementById('applications-content');
if (loading) loading.style.display = 'block';
if (content) content.style.display = 'none';
const data = await apiCall('get_my_applications');
if (loading) loading.style.display = 'none';
if (content) content.style.display = 'block';
if (data.status !== 'success') {
if (content) content.innerHTML = `<div class="bg-red-50 border border-red-200 rounded-xl p-6 text-red-600">${data.message}</div>`;
return;
}
const apps = data.data;
if (apps.length === 0) {
if (content) {
content.innerHTML = `
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 lg:p-12 text-center">
<div class="w-20 h-20 rounded-full bg-indigo-100 flex items-center justify-center mx-auto mb-4">
<i class="ph ph-file-text text-4xl text-indigo-600"></i>
</div>
<h2 class="text-xl font-bold text-slate-900 mb-2">No Applications Yet</h2>
<p class="text-slate-600 mb-6">You haven't applied to any jobs yet. Start browsing to find your dream job!</p>
<button onclick="navigate('seeker-search')" class="btn-primary px-6 py-3 text-white font-semibold rounded-xl touch-target">Browse Jobs</button>
</div>
`;
}
return;
}
if (content) {
content.innerHTML = `
<div class="space-y-4">
${apps.map(app => {
const statusColors = { 'pending': 'bg-amber-100 text-amber-700', 'accepted': 'bg-green-100 text-green-700', 'rejected': 'bg-red-100 text-red-700' };
const statusIcons = { 'pending': 'ph-clock', 'accepted': 'ph-check-circle', 'rejected': 'ph-x-circle' };
const statusLabel = { 'pending': 'Pending Review', 'accepted': 'Accepted', 'rejected': 'Rejected' };
const color = statusColors[app.status] || 'bg-slate-100 text-slate-600';
const icon = statusIcons[app.status] || 'ph-question';
const label = statusLabel[app.status] || app.status;
const appliedDate = app.applied_at ? new Date(app.applied_at).toLocaleDateString('en-KE', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
return `
<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 lg:p-6 card-hover">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
<div class="flex-1">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-100 to-teal-100 flex items-center justify-center text-2xl flex-shrink-0 overflow-hidden">
${renderAvatar(app.company, '🏢')}
</div>
<div class="flex-1">
<h3 class="font-bold text-lg text-slate-900">${app.title}</h3>
<p class="text-sm text-indigo-600 font-medium">${app.company}</p>
<div class="flex flex-wrap gap-3 mt-2 text-sm text-slate-600">
<span class="flex items-center gap-1"><i class="ph ph-map-pin"></i> ${app.location}</span>
<span class="flex items-center gap-1"><i class="ph ph-currency-dollar"></i> KES ${parseInt(app.salary).toLocaleString()}</span>
<span class="flex items-center gap-1"><i class="ph ph-clock"></i> ${app.job_type}</span>
</div>
<p class="text-xs text-slate-500 mt-2">Applied on ${appliedDate}</p>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<span class="px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 ${color}">
<i class="ph ${icon}"></i> ${label}
</span>
</div>
</div>
</div>
`;
}).join('')}
</div>
<div class="mt-6 lg:mt-8 bg-white rounded-2xl p-4 lg:p-6 border border-slate-100">
<h3 class="font-bold text-slate-900 mb-4">Application Summary</h3>
<div class="grid grid-cols-3 gap-3 lg:gap-4">
<div class="p-4 rounded-xl bg-amber-50 border border-amber-100 text-center">
<div class="text-2xl font-bold text-amber-700">${apps.filter(a => a.status === 'pending').length}</div>
<div class="text-sm text-amber-600">Pending</div>
</div>
<div class="p-4 rounded-xl bg-green-50 border border-green-100 text-center">
<div class="text-2xl font-bold text-green-700">${apps.filter(a => a.status === 'accepted').length}</div>
<div class="text-sm text-green-600">Accepted</div>
</div>
<div class="p-4 rounded-xl bg-red-50 border border-red-100 text-center">
<div class="text-2xl font-bold text-red-700">${apps.filter(a => a.status === 'rejected').length}</div>
<div class="text-sm text-red-600">Rejected</div>
</div>
</div>
</div>
`;
}

async function loadJobApplicants(jobId) {

}

</div>
</div>
</div>
<div class="divide-y divide-slate-100">
${applicants.map(app => {
const statusColors = { 'pending': 'bg-amber-100 text-amber-700', 'accepted': 'bg-green-100 text-green-700', 'rejected': 'bg-red-100 text-red-700' };
const color = statusColors[app.status] || 'bg-slate-100 text-slate-600';
const appliedDate = app.applied_at ? new Date(app.applied_at).toLocaleDateString('en-KE', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
const avatar = app.profile_picture ? `<img src="${app.profile_picture}" class="w-full h-full object-cover" alt="${app.full_name}" />` : '👤';
return `
<div class="p-4 lg:p-6 hover:bg-slate-50 transition-colors">
<div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
<div class="flex items-start gap-4 flex-1">
<div class="w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-teal-500 flex items-center justify-center text-2xl shadow-lg overflow-hidden flex-shrink-0">
${avatar}
</div>
<div class="flex-1">
<div class="flex flex-wrap items-center gap-2 mb-1">
<h3 class="font-bold text-lg text-slate-900">${app.full_name}</h3>

<div class="flex flex-wrap gap-3 text-sm text-slate-600 mb-2">
<span class="flex items-center gap-1"><i class="ph ph-envelope"></i> ${app.email}</span>

${app.bio ? `<p class="text-sm text-slate-700 mb-2"><strong>Bio:</strong> ${app.bio}</p>` : ''}

<div class="flex flex-wrap gap-2 mt-2">
${app.portfolio_url ? `<a href="${app.portfolio_url}" target="_blank" class="text-xs px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 flex items-center gap-1 touch-target"><i class="ph ph-globe"></i> Portfolio</a>` : ''}
${app.linkedin_url ? `<a href="${app.linkedin_url}" target="_blank" class="text-xs px-3 py-1 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 flex items-center gap-1 touch-target"><i class="ph ph-linkedin-logo"></i> LinkedIn</a>` : ''}
${app.github_url ? `<a href="${app.github_url}" target="_blank" class="text-xs px-3 py-1 bg-slate-100 text-slate-700 rounded-full hover:bg-slate-200 flex items-center gap-1 touch-target"><i class="ph ph-github-logo"></i> GitHub</a>` : ''}
</div>
<p class="text-xs text-slate-500 mt-2">Applied on ${appliedDate}</p>
</div>

<div class="flex gap-2 lg:flex-col">

}).join('')}

async function updateApplicantStatus(applicationId, status, jobId) {
const action = status === 'accepted' ? 'accept' : 'reject';
if (!confirm(`Are you sure you want to ${action} this applicant?`)) return;
const data = await apiCall('update_application_status', 'POST', { application_id: applicationId, status: status });
if (data.status === 'success') { showToast(`Applicant ${status} successfully!`, 'success'); loadJobApplicants(jobId); }
else { showToast(data.message, 'error'); }
}
