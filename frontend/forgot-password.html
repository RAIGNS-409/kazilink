<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - KaziLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <img src="https://image.qwenlm.ai/public_source/bc96688c-8f85-4680-8f59-fe72067bb9e0/1b9b2147d-a115-92dc-a98c-75b514408636.png" class="h-16 w-auto mx-auto mb-4" alt="KaziLink" />
            <h1 class="text-2xl font-bold text-slate-900">Forgot Password?</h1>
            <p class="text-slate-600 mt-2">Enter your email and we'll send you a reset link</p>
        </div>

        <div id="form-container">
            <form onsubmit="handleForgotPassword(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                    <input id="forgot-email" type="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="your@email.com" />
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-indigo-600 to-teal-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                    Send Reset Link
                </button>
            </form>
            <div id="error-msg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>
        </div>

        <div id="success-container" class="hidden text-center">
            <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                <i class="ph ph-envelope-simple text-5xl text-green-600"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">Check Your Email</h2>
            <p class="text-slate-600 mb-6">We've sent a password reset link to your email address. Please check your inbox (and spam folder).</p>
            <a href="/kazilink/frontend/index.html" class="inline-block bg-gradient-to-r from-indigo-600 to-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                Back to Login
            </a>
        </div>

        <div class="mt-6 text-center">
            <a href="/kazilink/frontend/index.html" class="text-indigo-600 hover:underline text-sm">← Back to Login</a>
        </div>
    </div>

    <script>
        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            errorMsg.classList.add('hidden');
            
            try {
                const res = await fetch('http://localhost/kazilink/api/api.php?action=forgot_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Send Reset Link';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>
</html>
