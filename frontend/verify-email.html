<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - KaziLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366F1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center">
            <div id="loading-state">
                <img src="https://image.qwenlm.ai/public_source/bc96688c-8f85-4680-8f59-fe72067bb9e0/1b9b2147d-a115-92dc-a98c-75b514408636.png" class="h-16 w-auto mx-auto mb-4" alt="KaziLink" />
                <div class="loader mx-auto mb-4"></div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Verifying Your Email</h2>
                <p class="text-slate-600">Please wait...</p>
            </div>
            
            <div id="success-state" class="hidden">
                <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                    <i class="ph ph-check-circle text-5xl text-green-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Email Verified! </h2>
                <p class="text-slate-600 mb-6">Your account is now active. You can login to access all features.</p>
                <a href="/kazilink/frontend/index.html" class="inline-block bg-gradient-to-r from-indigo-600 to-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                    Go to Login
                </a>
            </div>
            
            <div id="error-state" class="hidden">
                <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                    <i class="ph ph-x-circle text-5xl text-red-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Verification Failed</h2>
                <p id="error-message" class="text-slate-600 mb-6">The verification link is invalid or has expired.</p>
                <a href="/kazilink/frontend/index.html" class="inline-block bg-gradient-to-r from-indigo-600 to-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function verifyEmail() {
            if (!token) {
                showError('No verification token found in the link');
                return;
            }

            try {
                const res = await fetch('http://localhost/kazilink/api/api.php?action=verify_email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('success-state').classList.remove('hidden');
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }
        }

        function showError(message) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = message;
        }

        // Auto-verify on page load
        verifyEmail();
    </script>
</body>
</html>
