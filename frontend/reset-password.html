<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - KaziLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <img src="https://image.qwenlm.ai/public_source/bc96688c-8f85-4680-8f59-fe72067bb9e0/1b9b2147d-a115-92dc-a98c-75b514408636.png" class="h-16 w-auto mx-auto mb-4" alt="KaziLink" />
            <h1 class="text-2xl font-bold text-slate-900">Reset Password</h1>
            <p class="text-slate-600 mt-2">Enter your new password</p>
        </div>

        <div id="invalid-container" class="hidden text-center">
            <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                <i class="ph ph-x-circle text-5xl text-red-600"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">Invalid Link</h2>
            <p class="text-slate-600 mb-6">This reset link is invalid or has expired.</p>
            <a href="/kazilink/frontend/forgot-password.html" class="inline-block bg-gradient-to-r from-indigo-600 to-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                Request New Link
            </a>
        </div>

        <div id="form-container">
            <form onsubmit="handleResetPassword(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">New Password</label>
                    <input id="new-password" type="password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Minimum 6 characters" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Confirm Password</label>
                    <input id="confirm-password" type="password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Re-enter password" />
                </div>
                <div id="error-msg" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm"></div>
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-indigo-600 to-teal-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                    Reset Password
                </button>
            </form>
        </div>

        <div id="success-container" class="hidden text-center">
            <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
                <i class="ph ph-check-circle text-5xl text-green-600"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-900 mb-2">Password Reset!</h2>
            <p class="text-slate-600 mb-6">Your password has been updated successfully.</p>
            <a href="/kazilink/frontend/index.html" class="inline-block bg-gradient-to-r from-indigo-600 to-teal-600 text-white px-8 py-3 rounded-xl font-semibold hover:shadow-lg transition-all">
                Go to Login
            </a>
        </div>

        <div class="mt-6 text-center">
            <a href="/kazilink/frontend/index.html" class="text-indigo-600 hover:underline text-sm">← Back to Login</a>
        </div>
    </div>

    <script>
        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        console.log('Token from URL:', token);

        // If no token, show invalid message
        if (!token) {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('invalid-container').classList.remove('hidden');
        }

        async function handleResetPassword(e) {
            e.preventDefault();
            
            if (!token) {
                alert('No reset token found. Please use the link from your email.');
                return;
            }

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.remove('hidden');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Resetting...';
            errorMsg.classList.add('hidden');
            
            try {
                const res = await fetch('http://localhost/kazilink/api/api.php?action=reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });
                const data = await res.json();
                
                console.log('API Response:', data);
                
                if (data.status === 'success') {
                    document.getElementById('form-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }
    </script>
</body>
</html>
